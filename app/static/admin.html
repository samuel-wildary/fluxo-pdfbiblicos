<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Agente</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.css">
  <script src="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.js"></script>
  <style>
    body { margin:0; font-family:Inter,Arial,sans-serif; background:#08111f; color:#eef4ff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .app { padding:20px; display:flex; flex-direction:column; gap:16px; flex: 1; }
    .topbar, .panel { background:#0f1b30; border:1px solid rgba(255,255,255,.08); border-radius:18px; }
    .topbar { padding:18px 20px; display:flex; justify-content:space-between; align-items:center; gap:16px; flex-shrink: 0; }
    .topbar h1 { margin:0 0 6px; font-size:28px; }
    .muted { color:#9eb0cb; font-size:13px; line-height:1.45; }
    .save { border:0; background:#38bdf8; color:#07111d; font-weight:700; padding:12px 18px; border-radius:12px; cursor:pointer; }
    .save:disabled { opacity:.6; cursor:wait; }
    
    .layout { display:grid; grid-template-columns:300px 1fr 340px; gap:16px; align-items:start; flex: 1; min-height: 0; }
    .panel { display: flex; flex-direction: column; height: 100%; overflow: hidden; }
    .panel h2 { margin:0; font-size:18px; }
    .head { padding:16px 18px; border-bottom:1px solid rgba(255,255,255,.08); display:flex; justify-content:space-between; align-items:center; gap:12px; flex-shrink: 0; }
    .body { padding:16px 18px; overflow-y: auto; flex: 1; }
    
    .tabs { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px; }
    .tabs button, .btn, .danger { border:1px solid rgba(255,255,255,.1); background:rgba(255,255,255,.04); color:#eef4ff; border-radius:12px; padding:10px 12px; cursor:pointer; }
    .tabs .active { background:rgba(56,189,248,.18); border-color:rgba(56,189,248,.25); }
    .danger { background:rgba(251,113,133,.12); border-color:rgba(251,113,133,.2); color:#ffd7de; }
    
    .stack { display:flex; flex-direction:column; gap:12px; }
    .item, .tool { background:rgba(255,255,255,.03); border:1px solid rgba(255,255,255,.08); border-radius:14px; padding:12px; }
    .item strong, .tool strong { display:block; margin-bottom:6px; }
    textarea, input, select { width:100%; box-sizing: border-box; background:#08111f; border:1px solid rgba(255,255,255,.1); border-radius:12px; color:#eef4ff; padding:10px 12px; font:inherit; }
    textarea { min-height:90px; resize:vertical; }
    label { display:block; margin-bottom:6px; color:#9eb0cb; font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
    .field { margin-bottom:12px; }
    
    .row { display:flex; gap:8px; flex-wrap:wrap; }
    .chip { font-size:12px; padding:6px 10px; border-radius:999px; background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.08); }
    .drop { border:1px dashed rgba(255,255,255,.18); border-radius:14px; padding:16px; text-align:center; cursor:pointer; background:rgba(255,255,255,.02); display: block; }
    .empty { border:1px dashed rgba(255,255,255,.12); border-radius:14px; padding:18px; text-align:center; }
    .hint { background:rgba(56,189,248,.1); border:1px solid rgba(56,189,248,.18); border-radius:14px; padding:12px; margin-bottom:12px; }
    
    .toast { position:fixed; right:20px; bottom:20px; background:#0f1b30; border:1px solid rgba(255,255,255,.08); padding:12px 14px; border-radius:12px; transform:translateY(150%); transition:transform .2s; z-index: 9999; }
    .toast.show { transform:translateY(0); }
    .toast.error { border-color:rgba(251,113,133,.2); color:#ffd7de; }
    input[type=file] { display:none; }

    /* Drawflow Custom Styles */
    #drawflow { width: 100%; height: 100%; background: #08111f; background-image: radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 20px 20px; }
    .drawflow .drawflow-node { background: #0f1b30; border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; color: #eef4ff; padding: 0; width: 260px; }
    .drawflow .drawflow-node.selected { border-color: #38bdf8; box-shadow: 0 0 0 2px rgba(56,189,248,0.2); }
    .drawflow .drawflow-node .df-card { padding: 16px; cursor: pointer; }
    .drawflow .drawflow-node .df-card strong { display: block; font-size: 14px; margin-bottom: 6px; }
    .drawflow .drawflow-node .df-card .muted { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .drawflow .drawflow-node .tools-count { margin-top: 10px; font-size: 11px; color: #38bdf8; background: rgba(56,189,248,0.1); padding: 4px 8px; border-radius: 6px; display: inline-block; }
    .drawflow .connection .main-path { stroke: rgba(255,255,255,0.2); stroke-width: 3px; }
    .drawflow .connection .main-path:hover { stroke: #38bdf8; }
    .drawflow .drawflow-node .input, .drawflow .drawflow-node .output { width: 14px; height: 14px; border-radius: 50%; background: #08111f; border: 2px solid rgba(255,255,255,0.2); }
    .drawflow .drawflow-node .input:hover, .drawflow .drawflow-node .output:hover { border-color: #38bdf8; background: #38bdf8; }
    
    @media (max-width:1100px) { .layout { grid-template-columns:1fr; height: auto; overflow: visible; } body { height: auto; overflow: auto; } }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <h1>Construtor Visual do Agente (Flow)</h1>
        <div class="muted">Arraste os blocos e conecte as etapas para orientar a IA.</div>
      </div>
      <div style="display:flex;gap:12px">
        <button class="btn" onclick="testCapi()" style="background:rgba(56,189,248,.18);border-color:rgba(56,189,248,.25)">Teste CAPI</button>
        <button class="save" id="saveButton" onclick="saveAll()">Salvar painel</button>
      </div>
    </div>

    <div class="layout">
      <aside class="panel">
        <div class="head">
          <div>
            <h2>Laterais</h2>
            <div class="muted">Conecte ferramentas ao card.</div>
          </div>
          <button class="btn" onclick="addCard()">Novo card</button>
        </div>
        <div class="body">
          <div class="tabs">
            <button id="tabTools" class="active" onclick="setTab('tools')">Ferramentas</button>
            <button id="tabFiles" onclick="setTab('files')">Arquivos</button>
          </div>
          <div id="sidebar"></div>
        </div>
      </aside>

      <section class="panel">
        <div class="head">
          <div>
            <h2>Canvas de Fluxo</h2>
            <div class="muted">Arraste para mover, clique no card para editar.</div>
          </div>
        </div>
        <div class="body" style="padding: 0; position: relative;">
          <div style="position: absolute; top: 10px; left: 10px; right: 10px; z-index: 10; background: rgba(15, 27, 48, 0.9); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08);">
            <label style="margin-bottom: 4px;">Diretriz mestre do agente</label>
            <input id="systemDirective" placeholder="Ex: Você é um atendente comercial..." oninput="state.config.system_directive=this.value" style="background: transparent; border: none; padding: 0; outline: none; width: 100%;">
          </div>
          <div id="drawflow"></div>
        </div>
      </section>

      <aside class="panel">
        <div class="head">
          <div>
            <h2>Inspector</h2>
            <div class="muted">Edite o card selecionado.</div>
          </div>
        </div>
        <div class="body" id="inspector"></div>
      </aside>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const state = {
      config: { system_directive: '', cards: [], connections: [] },
      assets: [],
      assetConfig: { global_initial_delay: 0, files: {} },
      selectedCardId: null,
      tab: 'tools'
    };

    let editor = null;

    const uid = (prefix) => prefix + '_' + Math.random().toString(36).slice(2, 8);
    const esc = (v) => String(v || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    const jsq = (v) => JSON.stringify(String(v || ''));
    const toast = (msg, error=false) => { const el = document.getElementById('toast'); el.textContent = msg; el.className = 'toast show' + (error ? ' error' : ''); setTimeout(() => el.className = 'toast', 2500); };

    function normalizeTool(tool) {
      if(!tool || typeof tool !== 'object') return null;
      const kind = String(tool.kind || tool.type || '').toLowerCase();
      if(!['text','media'].includes(kind)) return null;
      if(kind === 'text') return { id: String(tool.id || uid('tool')), kind: 'text', label: String(tool.label || 'Texto via tool'), content: String(tool.content || tool.text || '') };
      return { id: String(tool.id || uid('tool')), kind: 'media', label: String(tool.label || tool.asset || tool.media_path || 'Arquivo'), asset: String(tool.asset || tool.media_path || '') };
    }

    function normalizeCard(card) {
      const tools = (Array.isArray(card?.tools) ? card.tools : Array.isArray(card?.actions) ? card.actions : []).map(normalizeTool).filter(Boolean);
      return { 
        id: String(card?.id || uid('card')), 
        title: String(card?.title || card?.name || 'Novo card'), 
        trigger: String(card?.trigger || ''), 
        instruction: String(card?.instruction || ''), 
        output_guidance: String(card?.output_guidance || card?.post_text || ''), 
        tools,
        ui: card?.ui || { x: 100, y: 100 }
      };
    }

    function normalizeConfig(config) {
      const rawCards = Array.isArray(config?.cards) ? config.cards : Array.isArray(config?.phases) ? config.phases : [];
      return { 
        system_directive: String(config?.system_directive || ''), 
        cards: rawCards.map(normalizeCard),
        connections: Array.isArray(config?.connections) ? config.connections : []
      };
    }

    function selectedCard() { return state.config.cards.find(card => card.id === state.selectedCardId) || null; }
    function setTab(tab) { state.tab = tab; renderSidebar(); }

    function initDrawflow() {
      const container = document.getElementById("drawflow");
      editor = new Drawflow(container);
      editor.reroute = true;
      editor.start();

      editor.on('nodeSelected', function(id) {
        const node = editor.getNodeFromId(id);
        if(node && node.data && node.data.cardId) {
          state.selectedCardId = node.data.cardId;
          renderInspector();
          renderSidebar();
        }
      });

      editor.on('nodeUnselected', function(id) {
        state.selectedCardId = null;
        renderInspector();
        renderSidebar();
      });

      editor.on('nodeMoved', function(id) {
        const node = editor.getNodeFromId(id);
        const card = state.config.cards.find(c => c.id === node.data.cardId);
        if(card) {
          card.ui = { x: node.pos_x, y: node.pos_y };
        }
      });
    }

    function getCardHtml(card) {
      return \`
        <div class="df-card">
          <strong>\${esc(card.title)}</strong>
          <div class="muted">\${esc(card.trigger || 'Sem gatilho definido')}</div>
          \${card.tools.length ? \`<div class="tools-count">\${card.tools.length} ferramenta(s)</div>\` : ''}
        </div>
      \`;
    }

    function buildDrawflow() {
      if(!editor) return;
      editor.clear();
      
      const idMap = {};
      state.config.cards.forEach(card => {
        const x = card.ui?.x || 100;
        const y = card.ui?.y || 100;
        const html = getCardHtml(card);
        const nodeId = editor.addNode('card', 1, 1, x, y, 'card-node', { cardId: card.id }, html);
        idMap[card.id] = nodeId;
      });

      if(state.config.connections) {
        state.config.connections.forEach(conn => {
          const fromNode = idMap[conn.from];
          const toNode = idMap[conn.to];
          if(fromNode && toNode) {
            editor.addConnection(fromNode, toNode, 'output_1', 'input_1');
          }
        });
      }
    }

    function updateNodeHtml(card) {
      if(!editor) return;
      const nodes = editor.export().drawflow.Home.data;
      for(let id in nodes) {
        if(nodes[id].data.cardId === card.id) {
          const el = document.querySelector('#node-'+id+' .drawflow_content_node');
          if(el) el.innerHTML = getCardHtml(card);
          break;
        }
      }
    }

    function addCard() {
      const card = { id: uid('card'), title: 'Novo card', trigger: '', instruction: '', output_guidance: '', tools: [], ui: { x: 150, y: 150 } };
      state.config.cards.push(card);
      const html = getCardHtml(card);
      const nodeId = editor.addNode('card', 1, 1, card.ui.x, card.ui.y, 'card-node', { cardId: card.id }, html);
      setTimeout(() => {
        editor.changeModule('Home');
      }, 50);
      state.selectedCardId = card.id;
      renderInspector();
      renderSidebar();
    }

    function removeCard(cardId) {
      if(!confirm('Apagar este card?')) return;
      state.config.cards = state.config.cards.filter(card => card.id !== cardId);
      if(state.selectedCardId === cardId) state.selectedCardId = null;
      
      const nodes = editor.export().drawflow.Home.data;
      for(let id in nodes) {
        if(nodes[id].data.cardId === cardId) {
          editor.removeNodeId('node-'+id);
          break;
        }
      }
      renderInspector();
      renderSidebar();
    }

    function updateCard(field, value) {
      const card = selectedCard();
      if(!card) return;
      card[field] = value;
      updateNodeHtml(card);
    }

    function connectText() { const card = selectedCard(); if(!card) return; card.tools.push({ id: uid('tool'), kind: 'text', label: 'Texto via tool', content: '' }); updateNodeHtml(card); renderInspector(); }
    function connectAsset(asset) { const card = selectedCard(); if(!card) return; card.tools.push({ id: uid('tool'), kind: 'media', label: asset, asset }); updateNodeHtml(card); renderInspector(); }
    function removeTool(toolId) { const card = selectedCard(); if(!card) return; card.tools = card.tools.filter(tool => tool.id !== toolId); updateNodeHtml(card); renderInspector(); }
    function updateTool(toolId, field, value) {
      const tool = selectedCard()?.tools.find(item => item.id === toolId);
      if(!tool) return;
      const previousAsset = tool.asset;
      tool[field] = value;
      if(tool.kind === 'media' && field === 'asset' && (!tool.label || tool.label === previousAsset)) tool.label = value;
      updateNodeHtml(selectedCard());
    }

    function updateAssetMeta(fileName, field, value) {
      if(!state.assetConfig.files[fileName]) state.assetConfig.files[fileName] = { delay_seconds: 0, presence: '' };
      state.assetConfig.files[fileName][field] = value;
    }

    function fileType(name) {
      const lower = String(name || '').toLowerCase();
      if(['.ogg','.mp3','.wav','.aac','.m4a','.opus'].some(ext => lower.endsWith(ext))) return 'Audio';
      if(['.jpg','.jpeg','.png','.gif','.webp'].some(ext => lower.endsWith(ext))) return 'Imagem';
      if(['.mp4','.avi','.mov','.mkv'].some(ext => lower.endsWith(ext))) return 'Video';
      if(lower.endsWith('.pdf')) return 'PDF';
      return 'Documento';
    }

    function renderSidebar() {
      document.getElementById('tabTools').classList.toggle('active', state.tab === 'tools');
      document.getElementById('tabFiles').classList.toggle('active', state.tab === 'files');
      const selected = selectedCard();
      if(state.tab === 'tools') {
        let html = \`<div class="hint"><div class="muted">\${selected ? \`Card selecionado: \${esc(selected.title || 'Sem titulo')}\` : 'Selecione um card no canvas para ligar uma ferramenta.'}</div></div>\`;
        html += \`<div class="stack"><div class="tool"><strong>Texto via tool</strong><div class="muted">Dispara um texto pronto dentro do card.</div><button class="btn" style="margin-top:10px;width:100%" \${selected ? '' : 'disabled'} onclick="connectText()">Conectar texto</button></div>\`;
        if(state.assets.length) {
          state.assets.forEach(asset => {
            const meta = state.assetConfig.files[asset.name] || {};
            html += \`<div class="tool"><strong>\${esc(asset.name)}</strong><div class="muted">\${esc(fileType(asset.name))} | delay \${Number(meta.delay_seconds || 0)}s</div><button class="btn" style="margin-top:10px;width:100%" \${selected ? '' : 'disabled'} onclick='connectAsset(\${jsq(asset.name)})'>Conectar arquivo</button></div>\`;
          });
        } else {
          html += \`<div class="empty"><div class="muted">Nenhum arquivo enviado ainda.</div></div>\`;
        }
        html += \`</div>\`;
        document.getElementById('sidebar').innerHTML = html;
      } else {
        let html = \`<div class="field"><label>Atraso inicial da primeira resposta</label><input type="number" min="0" value="\${Number(state.assetConfig.global_initial_delay || 0)}" oninput="state.assetConfig.global_initial_delay=Number(this.value||0)"></div>\`;
        html += \`<label class="drop" id="dropZone"><input id="fileInput" type="file" multiple onchange="handleFiles(this.files)"><strong>Arraste ou clique para enviar arquivos</strong><div class="muted" style="margin-top:8px">Audios, imagens, PDFs e outros arquivos para ligar nos cards.</div></label>\`;
        if(state.assets.length) {
          html += \`<div class="stack" style="margin-top:12px">\`;
          state.assets.forEach(asset => {
            const meta = state.assetConfig.files[asset.name] || { delay_seconds: 0, presence: '' };
            html += \`<div class="item"><strong>\${esc(asset.name)}</strong><div class="muted">\${esc(fileType(asset.name))} | \${(asset.size / 1024).toFixed(1)} KB</div><div class="row" style="margin-top:10px"><select onchange='updateAssetMeta(\${jsq(asset.name)},"presence",this.value)'><option value="" \${meta.presence === '' ? 'selected' : ''}>Sem status</option><option value="composing" \${meta.presence === 'composing' ? 'selected' : ''}>Digitando</option><option value="recording" \${meta.presence === 'recording' ? 'selected' : ''}>Gravando audio</option></select><input type="number" min="0" value="\${Number(meta.delay_seconds || 0)}" oninput='updateAssetMeta(\${jsq(asset.name)},"delay_seconds",Number(this.value||0))'></div><div class="row" style="margin-top:10px;justify-content:flex-end"><button class="danger" onclick='deleteAsset(\${jsq(asset.name)})'>Excluir arquivo</button></div></div>\`;
          });
          html += \`</div>\`;
        } else {
          html += \`<div class="empty" style="margin-top:12px"><div class="muted">Nenhum arquivo enviado.</div></div>\`;
        }
        document.getElementById('sidebar').innerHTML = html;
        bindDropZone();
      }
    }

    function renderInspector() {
      const card = selectedCard();
      if(!card) {
        document.getElementById('inspector').innerHTML = \`<div class="empty"><strong>Selecione um card</strong><div class="muted" style="margin-top:8px">As propriedades do card aparecem aqui.</div></div>\`;
        return;
      }
      let toolsHtml = '';
      if(card.tools.length) {
        toolsHtml = \`<div class="stack">\`;
        card.tools.forEach(tool => {
          if(tool.kind === 'text') {
            toolsHtml += \`<div class="item"><div class="row" style="justify-content:space-between;align-items:flex-start"><div><strong>Texto conectado</strong><div class="muted">Texto que o card pode disparar via tool.</div></div><button class="danger" onclick='removeTool(\${jsq(tool.id)})'>Remover</button></div><div class="field" style="margin-top:10px"><label>Nome</label><input value="\${esc(tool.label || '')}" oninput='updateTool(\${jsq(tool.id)},"label",this.value)'></div><div class="field" style="margin-bottom:0"><label>Conteudo</label><textarea oninput='updateTool(\${jsq(tool.id)},"content",this.value)'>\${esc(tool.content || '')}</textarea></div></div>\`;
          } else {
            const options = \`<option value="">Selecione um arquivo</option>\` + state.assets.map(asset => \`<option value="\${esc(asset.name)}" \${tool.asset === asset.name ? 'selected' : ''}>\${esc(asset.name)}</option>\`).join('');
            toolsHtml += \`<div class="item"><div class="row" style="justify-content:space-between;align-items:flex-start"><div><strong>Arquivo conectado</strong><div class="muted">Arquivo que o card pode enviar via tool.</div></div><button class="danger" onclick='removeTool(\${jsq(tool.id)})'>Remover</button></div><div class="field" style="margin-top:10px"><label>Nome interno</label><input value="\${esc(tool.label || '')}" oninput='updateTool(\${jsq(tool.id)},"label",this.value)'></div><div class="field" style="margin-bottom:0"><label>Arquivo ligado</label><select onchange='updateTool(\${jsq(tool.id)},"asset",this.value)'>\${options}</select></div></div>\`;
          }
        });
        toolsHtml += \`</div>\`;
      } else {
        toolsHtml = \`<div class="empty"><div class="muted">Nenhuma ferramenta conectada neste card.</div></div>\`;
      }
      document.getElementById('inspector').innerHTML = \`
        <div class="row" style="justify-content: flex-end; margin-bottom: 12px;">
          <button class="danger" onclick='removeCard(\${jsq(card.id)})'>Excluir Card</button>
        </div>
        <div class="field"><label>Titulo do card</label><input value="\${esc(card.title || '')}" oninput="updateCard('title',this.value)"></div>
        <div class="field"><label>Quando ativar este card</label><textarea oninput="updateCard('trigger',this.value)">\${esc(card.trigger || '')}</textarea></div>
        <div class="field"><label>Instrucao principal do card</label><textarea oninput="updateCard('instruction',this.value)">\${esc(card.instruction || '')}</textarea></div>
        <div class="field"><label>Saida desejada apos este card</label><textarea oninput="updateCard('output_guidance',this.value)">\${esc(card.output_guidance || '')}</textarea></div>
        <h2 style="font-size:16px;margin:8px 0 12px">Ferramentas conectadas</h2>\${toolsHtml}
      \`;
    }

    function renderAll() {
      document.getElementById('systemDirective').value = state.config.system_directive || '';
      renderSidebar();
      buildDrawflow();
      renderInspector();
    }

    async function loadFlow() {
      const response = await fetch('/api/flow-config');
      const data = await response.json();
      state.config = normalizeConfig(data.config || {});
    }

    async function loadAssets() {
      const response = await fetch('/api/assets');
      const data = await response.json();
      state.assets = Array.isArray(data.files) ? data.files : [];
      state.assetConfig = { global_initial_delay: Number(data.global_initial_delay || 0), files: {} };
      state.assets.forEach(asset => {
        state.assetConfig.files[asset.name] = { delay_seconds: Number(asset.delay_seconds || 0), presence: String(asset.presence || '') };
      });
    }

    async function saveAssetConfig() {
      await fetch('/api/asset-config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ config: state.assetConfig }) });
    }

    async function saveAll() {
      const button = document.getElementById('saveButton');
      button.disabled = true;
      button.textContent = 'Salvando...';
      try {
        state.config.system_directive = document.getElementById('systemDirective').value;
        
        // Extrair posições e conexões do drawflow
        const exported = editor.export().drawflow.Home.data;
        const idToCardId = {};
        
        // Atualiza posições
        for(let id in exported) {
          const node = exported[id];
          const card = state.config.cards.find(c => c.id === node.data.cardId);
          if(card) {
            card.ui = { x: node.pos_x, y: node.pos_y };
            idToCardId[id] = card.id;
          }
        }
        
        // Extrai conexões
        state.config.connections = [];
        for(let id in exported) {
          const node = exported[id];
          const cardId = idToCardId[id];
          if(!cardId) continue;
          
          const outputs = node.outputs;
          for(let out in outputs) {
            outputs[out].connections.forEach(conn => {
              const targetCardId = idToCardId[conn.node];
              if(targetCardId) {
                state.config.connections.push({ from: cardId, to: targetCardId });
              }
            });
          }
        }
        
        await fetch('/api/flow-config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ config: state.config }) });
        await saveAssetConfig();
        toast('Painel salvo com sucesso.');
      } catch(error) {
        console.error(error);
        toast('Erro ao salvar o painel.', true);
      } finally {
        button.disabled = false;
        button.textContent = 'Salvar painel';
      }
    }

    async function deleteAsset(fileName) {
      if(!confirm('Excluir este arquivo?')) return;
      try {
        await fetch('/api/assets/' + encodeURIComponent(fileName), { method: 'DELETE' });
        state.config.cards.forEach(card => { card.tools = card.tools.filter(tool => !(tool.kind === 'media' && tool.asset === fileName)); });
        await loadAssets();
        renderSidebar();
        renderInspector();
        state.config.cards.forEach(card => updateNodeHtml(card));
        toast('Arquivo removido.');
      } catch(error) {
        console.error(error);
        toast('Nao foi possivel excluir o arquivo.', true);
      }
    }

    async function handleFiles(files) {
      if(!files || !files.length) return;
      try {
        for(const file of files) {
          const formData = new FormData();
          formData.append('file', file);
          await fetch('/api/assets/upload', { method: 'POST', body: formData });
        }
        await loadAssets();
        renderSidebar();
        toast('Arquivo enviado com sucesso.');
      } catch(error) {
        console.error(error);
        toast('Erro ao enviar arquivo.', true);
      }
    }

    async function testCapi() {
      const code = prompt("Teste CAPI (Opcional): Se quiser que o evento vá para a sua aba de Eventos de Teste no Gerenciador da Meta, digite o código exato (ex: TEST12345). Ou então deixe em branco para enviar um disparo cego comum:");
      if(code === null) return;
      try {
        toast('Enviando evento pra Meta...');
        const res = await fetch('/api/test-capi', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ test_event_code: code })
        });
        if(!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Erro na requisicao');
        }
        toast('✅ Evento Aceito pela Meta!');
      } catch (error) {
        console.error(error);
        toast('❌ Falha na CAPI: Verifique API Key.', true);
      }
    }

    function bindDropZone() {
      const zone = document.getElementById('dropZone');
      if(!zone) return;
      zone.addEventListener('dragover', event => { event.preventDefault(); zone.classList.add('dragover'); });
      zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
      zone.addEventListener('drop', event => { event.preventDefault(); zone.classList.remove('dragover'); handleFiles(event.dataTransfer.files); });
    }

    async function init() {
      initDrawflow();
      try {
        await Promise.all([loadFlow(), loadAssets()]);
        renderAll();
      } catch(error) {
        console.error(error);
        toast('Erro ao carregar o painel.', true);
      }
    }

    window.onload = init;
  </script>
</body>
</html>
